name: Release DEBs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debs:
    name: Build DEBs
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install magpie from GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UBUNTU_VER=$(lsb_release -rs)
          mkdir -p /tmp/magpie-debs
          gh release download \
            --repo luxai-qtrobot/magpie-cpp \
            --pattern "libmagpie_*deb${UBUNTU_VER}_amd64.deb" \
            --dir /tmp/magpie-debs \
            --clobber
          sudo apt-get install -y /tmp/magpie-debs/*.deb

      - name: Install paramify from GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UBUNTU_VER=$(lsb_release -rs)
          mkdir -p /tmp/paramify-debs
          gh release download \
            --repo luxai-qtrobot/paramify-cpp \
            --pattern "libparamify-dev_*deb${UBUNTU_VER}_amd64.deb" \
            --dir /tmp/paramify-debs \
            --clobber
          sudo apt-get install -y /tmp/paramify-debs/*.deb

      - name: Install system deps
        run: |
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config g++ \
            libzmq3-dev \
            dpkg-dev fakeroot \
            libyaml-cpp-dev libfmt-dev libmsgpack-dev \
            libopencv-dev libeigen3-dev

      - name: Configure (Release)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Package (.deb via CPack)
        run: |
          cd build
          cpack -G DEB

      - name: Upload DEBs as workflow artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: debs-ubuntu-24.04
          path: build/*.deb
          if-no-files-found: error

      - name: Upload DEBs to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb
          fail_on_unmatched_files: true
